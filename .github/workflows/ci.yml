# ============================================================
# GitHub Actions CI/CD Pipeline
# ============================================================
#
# WHEN IT RUNS:
# - On every push to 'main' branch
# - On every Pull Request targeting 'main'
#
# WHAT IT DOES:
# 1. Lint check (code quality gate)
# 2. Run all tests for each service
# 3. Build Docker images (on main branch only)
# 4. Deploy to Render/Railway (on main branch only)
#
# WHY CI/CD?
# Without this, a developer pushes broken code → users see errors.
# CI/CD creates a safety net: code only ships if tests pass.
# This is standard at every company from startups to FAANG.

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ---- Job 1: Test Auth Service ----
  test-auth-service:
    name: Test Auth Service
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ecommerce_auth_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/services/auth-service/package-lock.json

      - name: Install dependencies
        working-directory: backend/services/auth-service
        run: npm ci

      - name: Run tests
        working-directory: backend/services/auth-service
        env:
          NODE_ENV: test
          PORT: 3001
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: ecommerce_auth_test
          DB_USER: postgres
          DB_PASSWORD: testpassword
          JWT_ACCESS_SECRET: test_access_secret_at_least_32_chars
          JWT_REFRESH_SECRET: test_refresh_secret_at_least_32_chars
          JWT_ACCESS_EXPIRES_IN: 15m
          JWT_REFRESH_EXPIRES_IN: 7d
          CORS_ORIGIN: http://localhost:5173
        run: npm test -- --coverage

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          directory: backend/services/auth-service/coverage

  # ---- Job 2: Test Product Service ----
  test-product-service:
    name: Test Product Service
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ecommerce_products_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install and test
        working-directory: backend/services/product-service
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: ecommerce_products_test
          DB_USER: postgres
          DB_PASSWORD: testpassword
          JWT_ACCESS_SECRET: test_access_secret_at_least_32_chars
        run: |
          npm ci
          npm test

  # ---- Job 3: Build Docker Images (main branch only) ----
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-auth-service, test-product-service]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push auth-service image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/services/auth-service
          push: true
          tags: ghcr.io/${{ github.repository }}/auth-service:${{ github.sha }}

      - name: Build and push product-service image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/services/product-service
          push: true
          tags: ghcr.io/${{ github.repository }}/product-service:${{ github.sha }}
