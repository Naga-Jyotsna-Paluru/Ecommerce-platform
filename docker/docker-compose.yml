version: '3.9'

# ============================================================
# Docker Compose — Local Development Stack
# Usage: docker-compose up
# ============================================================
#
# This file orchestrates all services together locally.
# In production, each service runs independently on the cloud.
#
# SERVICES:
# - postgres_auth     : PostgreSQL for auth-service
# - postgres_products : PostgreSQL for product-service
# - postgres_orders   : PostgreSQL for order-service
# - redis             : Shared cache and session store
# - auth-service      : Port 3001
# - product-service   : Port 3002
# - order-service     : Port 3003
# - payment-service   : Port 3004
# - notification-svc  : Port 3005
# ============================================================

services:

  # --- Databases ---
  # Each service gets its own database — microservices principle:
  # services do NOT share databases. This ensures true independence.

  postgres_auth:
    image: postgres:16-alpine
    container_name: ecommerce_pg_auth
    environment:
      POSTGRES_DB: ecommerce_auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword}
    volumes:
      - pg_auth_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"   # Host port 5433 → container port 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres_products:
    image: postgres:16-alpine
    container_name: ecommerce_pg_products
    environment:
      POSTGRES_DB: ecommerce_products
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword}
    volumes:
      - pg_products_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres_orders:
    image: postgres:16-alpine
    container_name: ecommerce_pg_orders
    environment:
      POSTGRES_DB: ecommerce_orders
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword}
    volumes:
      - pg_orders_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ecommerce_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-devpassword}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-devpassword}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Application Services ---

  auth-service:
    build:
      context: ../backend/services/auth-service
      dockerfile: Dockerfile
    container_name: ecommerce_auth
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      DB_HOST: postgres_auth
      DB_PORT: 5432
      DB_NAME: ecommerce_auth
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-devpassword}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev_access_secret_change_in_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev_refresh_secret_change_in_production}
      CORS_ORIGIN: http://localhost:5173
    depends_on:
      postgres_auth:
        condition: service_healthy

  product-service:
    build:
      context: ../backend/services/product-service
      dockerfile: Dockerfile
    container_name: ecommerce_products
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: development
      PORT: 3002
      DB_HOST: postgres_products
      DB_PORT: 5432
      DB_NAME: ecommerce_products
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-devpassword}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev_access_secret_change_in_production}
      CORS_ORIGIN: http://localhost:5173
    depends_on:
      postgres_products:
        condition: service_healthy

  order-service:
    build:
      context: ../backend/services/order-service
      dockerfile: Dockerfile
    container_name: ecommerce_orders
    ports:
      - "3003:3003"
    environment:
      NODE_ENV: development
      PORT: 3003
      DB_HOST: postgres_orders
      DB_PORT: 5432
      DB_NAME: ecommerce_orders
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-devpassword}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev_access_secret_change_in_production}
      SERVICE_SECRET: ${SERVICE_SECRET:-dev_service_secret_change_in_production}
      PRODUCT_SERVICE_URL: http://product-service:3002
      CORS_ORIGIN: http://localhost:5173
    depends_on:
      postgres_orders:
        condition: service_healthy
      product-service:
        condition: service_started

  cart-service:
    build:
      context: ../backend/services/cart-service
      dockerfile: Dockerfile
    container_name: ecommerce_cart
    ports:
      - "3004:3004"
    environment:
      NODE_ENV: development
      PORT: 3004
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-devpassword}
      CART_TTL_SECONDS: 604800
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev_access_secret_change_in_production}
      CORS_ORIGIN: http://localhost:5173
    depends_on:
      redis:
        condition: service_healthy

  # --- Phase 3 Services ---

  # ── RabbitMQ — Message Broker (Phase 5) ───────────────────────────────────
  # Used for async event-driven communication between services.
  # After a payment succeeds, payment-service publishes an event to RabbitMQ
  # instead of directly calling notification-service. This decouples the two
  # services — if notifications are down, payments still complete.
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: ecommerce_rabbitmq
    ports:
      - "5672:5672"    # AMQP protocol
      - "15672:15672"  # Management UI (http://localhost:15672, guest/guest)
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-admin123}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API Gateway (nginx) — Phase 5 ────────────────────────────────────────
  # Single entry point for all client requests.
  # Routes /api/auth/* → auth-service, /api/products → product-service, etc.
  # Centralises rate limiting, logging, and real-IP forwarding.
  api-gateway:
    image: nginx:1.27-alpine
    container_name: ecommerce_gateway
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - product-service
      - order-service
      - cart-service
      - payment-service
      - notification-service
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres_payments:
    image: postgres:16-alpine
    container_name: ecommerce_pg_payments
    environment:
      POSTGRES_DB: ecommerce_payments
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword}
    volumes:
      - pg_payments_data:/var/lib/postgresql/data
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  payment-service:
    build:
      context: ../backend/services/payment-service
      dockerfile: Dockerfile
    container_name: ecommerce_payments
    ports:
      - "3005:3005"
    environment:
      NODE_ENV: development
      PORT: 3005
      DB_HOST: postgres_payments
      DB_PORT: 5432
      DB_NAME: ecommerce_payments
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-devpassword}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev_access_secret_change_in_production}
      SERVICE_SECRET: ${SERVICE_SECRET:-dev_service_secret_change_in_production}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      ORDER_SERVICE_URL: http://order-service:3003
      NOTIFICATION_SERVICE_URL: http://notification-service:3006
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-admin}:${RABBITMQ_PASS:-admin123}@rabbitmq:5672
      CORS_ORIGIN: http://localhost:5173
    depends_on:
      postgres_payments:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  notification-service:
    build:
      context: ../backend/services/notification-service
      dockerfile: Dockerfile
    container_name: ecommerce_notifications
    ports:
      - "3006:3006"
    environment:
      NODE_ENV: development
      PORT: 3006
      SERVICE_SECRET: ${SERVICE_SECRET:-dev_service_secret_change_in_production}
      SMTP_HOST: ${SMTP_HOST:-smtp.mailtrap.io}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@ecommerce.local}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-admin}:${RABBITMQ_PASS:-admin123}@rabbitmq:5672
      CORS_ORIGIN: http://localhost:5173
    depends_on:
      rabbitmq:
        condition: service_healthy

# Named volumes — data persists across docker-compose down/up
volumes:
  pg_auth_data:
  pg_products_data:
  pg_orders_data:
  pg_payments_data:
  redis_data:
  rabbitmq_data:
