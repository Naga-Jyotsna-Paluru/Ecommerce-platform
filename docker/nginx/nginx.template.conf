# ============================================================
# nginx.template.conf — PRODUCTION API Gateway
#
# This file uses ${VAR} placeholders that are replaced at
# container startup by envsubst (gettext).
#
# WHY ENVSUBST?
# Railway assigns a dynamic PORT per service and internal service
# hostnames follow the pattern: <service-name>.railway.internal
# Neither value is known at build time, so we template them.
#
# Required environment variables:
#   PORT                       — assigned automatically by Railway
#   AUTH_SERVICE_HOST          — e.g. auth-service.railway.internal
#   AUTH_SERVICE_PORT          — e.g. 3001
#   PRODUCT_SERVICE_HOST
#   PRODUCT_SERVICE_PORT
#   ORDER_SERVICE_HOST
#   ORDER_SERVICE_PORT
#   CART_SERVICE_HOST
#   CART_SERVICE_PORT
#   PAYMENT_SERVICE_HOST
#   PAYMENT_SERVICE_PORT
#   NOTIFICATION_SERVICE_HOST
#   NOTIFICATION_SERVICE_PORT
# ============================================================

events {
  worker_connections 1024;
}

http {
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;

  upstream auth_svc         { server ${AUTH_SERVICE_HOST}:${AUTH_SERVICE_PORT}; }
  upstream product_svc      { server ${PRODUCT_SERVICE_HOST}:${PRODUCT_SERVICE_PORT}; }
  upstream order_svc        { server ${ORDER_SERVICE_HOST}:${ORDER_SERVICE_PORT}; }
  upstream cart_svc         { server ${CART_SERVICE_HOST}:${CART_SERVICE_PORT}; }
  upstream payment_svc      { server ${PAYMENT_SERVICE_HOST}:${PAYMENT_SERVICE_PORT}; }
  upstream notification_svc { server ${NOTIFICATION_SERVICE_HOST}:${NOTIFICATION_SERVICE_PORT}; }

  server {
    listen ${PORT};
    server_name _;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    client_max_body_size 10m;
    limit_req zone=api_limit burst=20 nodelay;

    # ── Routes WITH /api/ prefix (used by local dev proxy) ────
    location /api/auth/ {
      proxy_pass http://auth_svc;
    }

    location /api/products {
      proxy_pass http://product_svc;
    }

    location /api/categories {
      proxy_pass http://product_svc;
    }

    location /api/orders {
      proxy_pass http://order_svc;
    }

    location /api/cart {
      proxy_pass http://cart_svc;
    }

    location /api/payments {
      proxy_pass http://payment_svc;
    }

    location /api/notifications {
      proxy_pass http://notification_svc;
    }

    # ── Routes WITHOUT /api/ prefix (used by production frontend) ──
    # Rewrites /products → /api/products before proxying so the
    # microservice route handlers match correctly.
    location ~ ^/auth(/|$) {
      rewrite ^/auth(.*)$ /api/auth$1 break;
      proxy_pass http://auth_svc;
    }

    location ~ ^/products(/|$) {
      rewrite ^/products(.*)$ /api/products$1 break;
      proxy_pass http://product_svc;
    }

    location ~ ^/categories(/|$) {
      rewrite ^/categories(.*)$ /api/categories$1 break;
      proxy_pass http://product_svc;
    }

    location ~ ^/orders(/|$) {
      rewrite ^/orders(.*)$ /api/orders$1 break;
      proxy_pass http://order_svc;
    }

    location ~ ^/cart(/|$) {
      rewrite ^/cart(.*)$ /api/cart$1 break;
      proxy_pass http://cart_svc;
    }

    location ~ ^/payments(/|$) {
      rewrite ^/payments(.*)$ /api/payments$1 break;
      proxy_pass http://payment_svc;
    }

    location ~ ^/notifications(/|$) {
      rewrite ^/notifications(.*)$ /api/notifications$1 break;
      proxy_pass http://notification_svc;
    }

    location /health {
      access_log off;
      return 200 '{"status":"ok","service":"api-gateway"}';
      add_header Content-Type application/json;
    }

    location / {
      return 404 '{"success":false,"message":"Route not found"}';
      add_header Content-Type application/json;
    }
  }
}
