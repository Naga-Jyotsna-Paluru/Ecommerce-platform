# ============================================================
# nginx API Gateway — routes all /api/* traffic to the
# correct microservice by path prefix.
#
# WHY AN API GATEWAY?
# - Single entry point for all clients (frontend, mobile, etc.)
# - Centralised rate limiting & request logging
# - Services never need to know each other's addresses
# - Enables future features: auth offloading, caching, SSL termination
# ============================================================

events {
  worker_connections 1024;
}

http {
  # ── Rate limiting zone (shared memory, 10 MB) ──────────────
  # Each unique IP gets a token bucket: 100 requests / minute.
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;

  # ── Upstream blocks — one per microservice ─────────────────
  # Using service names from docker-compose (DNS auto-resolved inside the network).
  upstream auth_svc         { server auth-service:3001; }
  upstream product_svc      { server product-service:3002; }
  upstream order_svc        { server order-service:3003; }
  upstream cart_svc         { server cart-service:3004; }
  upstream payment_svc      { server payment-service:3005; }
  upstream notification_svc { server notification-service:3006; }

  server {
    listen 8080;
    server_name _;

    # Add standard forwarding headers so services know the real client IP
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Allow large request bodies (product images, Stripe webhooks)
    client_max_body_size 10m;

    # Stripe webhook must pass through with raw body intact.
    # nginx does not modify the body — raw body preservation is
    # handled by express.raw() in payment-service/app.js.

    # Apply rate limiting globally (burst of 20 allows short spikes)
    limit_req zone=api_limit burst=20 nodelay;

    # ── Route: Auth Service ─────────────────────────────────
    location /api/auth/ {
      proxy_pass http://auth_svc;
    }

    # ── Route: Product Service ──────────────────────────────
    location /api/products {
      proxy_pass http://product_svc;
    }
    location /api/categories {
      proxy_pass http://product_svc;
    }

    # ── Route: Order Service ────────────────────────────────
    location /api/orders {
      proxy_pass http://order_svc;
    }

    # ── Route: Cart Service ─────────────────────────────────
    location /api/cart {
      proxy_pass http://cart_svc;
    }

    # ── Route: Payment Service ──────────────────────────────
    location /api/payments {
      proxy_pass http://payment_svc;
    }

    # ── Route: Notification Service ─────────────────────────
    location /api/notifications {
      proxy_pass http://notification_svc;
    }

    # ── Health check endpoint (gateway-level) ───────────────
    location /health {
      access_log off;
      return 200 '{"status":"ok","service":"api-gateway"}';
      add_header Content-Type application/json;
    }

    # ── Catch-all 404 ───────────────────────────────────────
    location / {
      return 404 '{"success":false,"message":"Route not found"}';
      add_header Content-Type application/json;
    }
  }
}
